<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>for_each</title>
</head>
<body>
    <script>
        // forEach : 
        // - 배열에서 많이 사용
        // - forEach(함수) : 함수가 매개변수로 오는 메서드
        let brands = ["애플", "구글", "마이크로소프트", "삼성", "아마존", "테슬라", "윈터"];

        // 무조건 index를 사용하고 싶으면 뒤에 다가 작성해야함. 이 부분을 조심해야함.
        brands.forEach(function (brand, index) {
            console.log(brand, index);
        });  // 선언함수

        // forEach를 사용하는 이유 : 

        // 활용 : 
        const myScore = [70, 90, 99, 56, 80, 77];
        let total = 0;
        myScore.forEach(function(score){
            total += score;
        });
        console.log("총점 : "+total);
        console.log("평균 : "+parseInt(total/(myScore.length)));    
    </script>
</body>
</html>
