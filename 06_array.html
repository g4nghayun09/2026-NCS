<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>array</title>
</head>

<body>
    <script>
        // 배열 
        // - 하나 이상의 데이터를 담을 수 있다. 
        // - 순서가 있다.
        // - []를 이용해서 할당한다.
        // - 어떤 데이터 타입도 함께 올 수 있다.
        let nums = [1, 3, 12, 4, 67, -89, 12.345];
        let str = ['a', 'b', 'c'];
        let mix = [1, 'a', 3.5, false, {name : "김기범"}, [1,2,3]];
        // 1. 속성 : property length
        // console.logf(nums.length);
        // console.logf(str.length);
        // console.logf(mix.length);

        // 2. 인덱스 : [],0부터, 배열의 순서는 항상 지켜준다. 
        console.log(mix[3]);

        // 3. 요소 수정
        nums[4] = 89;
        console.log(nums);

        // 4. 다양한 내장함수가 지원이된다. : push(value), pop()
        // pop에는 매개변수가 없음. pop은 배열에 마지막에 있는 요소를 꺼내는 것임.,
        // push는 마지막에 추가함. push, pop은 많이 씀. 가장 많이 쓰는 내장함수임.
        console.log(mix.pop());
        console.log(nums.push(1));

        // 5. 배열과 객체의 활용 
        // 배열은 객체와 어울려서 사용됨.
        // 예를 들어 개발한 시스템에서 사용자 목록을 읽어온다고 가정해보자.
        let userList = [
            {
                name: "정국",
                gender: "남자",
                email: "jung@gmail.com",
                phone: "000-1111-1111",
            },
            {
                name: "뷔",
                gender: "남자",
                email: "vui@gmail.com",
                phone: "000-2222-1111",
            },
            {
                name: "로제",
                gender: "여자",
                email: "rose@gmail.com",
                phone: "000-3333-1111",
            },
        ];
        let user1 = userList[0];
        let user2 = userList[1];
        let user3 = userList[2];
        console.log(user1.name);
        console.log(user2.phone);
        console.log(user3.email);

        
    </script>
</body>
</html>
