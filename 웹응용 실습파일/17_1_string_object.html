<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>1_string_object</title>
</head> 
<body>
    <script>
    // 1. slice실무 활용 예제
        // 1-1 긴 텍스트를 "더보기"처리 
        const longString = "자바스크립트 실무 마스터 : 기초에서 심화까지 한 번에 끝내기";

        const truncateTitle = (title, maxLength) =>{
            if(title.length > maxLength) {
                return title.slice(0, maxLength) + "......";
            }
            return title;
        }
        console.log(truncateTitle(longString, 10));
        // 1-2 전화 번호 뒷자리 **** 로 마스킹 처리
        let phoneNumber = "010-1234-5678";

        const hiddenNumber = phoneNumber.slice(0, 9) + "****"; // 여기에서 9말고 -4하는게 더 정확함. 즉 슬라이스를 앞에서도 할 수 있고 뒤에서도 할 수 있음.
        console.log(hiddenNumber); // 010-1234-****
        
    // 2. replace실무 활용 예제 (with 정규식(regular expression)) 정규식 중요함.
        /* 정규식
            - // 사이에 작성
            -  \는 아니다의 의미
            - D는 숫자를 의미. => \D는 숫자가 아닌 것 ,숫자를 의미하는게 하나가 아님.
            - option : g => 모두 바꿔라
        */
        // 2-1 전화번호를 입렵받아 db에 저장 => 01021345678
        phoneNumber = "010-1234-5678";
        
        const clearNumber = (phoneNumber)=>{
            while(phoneNumber.indexOf("-")!=-1) {
                phoneNumber = phoneNumber.replace("-","");
            }
           return phoneNumber;
        };
        // const clearNumber = phoneNumber.replace(/\D/g, ""); // 숫자가 아닌 것은 없애라, 여기서 g를 붙이면 전체를 의미함.
        console.log(clearNumber(phoneNumber));

        let str = "Welcome Jeju!! Jeju!!";
        console.log(str.replace(/Jeju/g, "Seoul"));

    // 3. padStart실무 활용 예제

        // 3-1 쇼핑 사이트에서 주문 번호나 회원번호를 생성하고 관리하기 편하도록 
        let memberNumber = 234;

        const generateMemberNumber = (number, digit) => {
            return "MN-"+String(number).padStart(digit, "0");
        }
        console.log(generateMemberNumber(memberNumber, 6)); // MN-000234
    // 4. charAt 실무 활용 예제
        const checkGender = (sn) => {
            sn = sn.padStart("0", 14);
            let genderNum = sn.charAt(sn.indexOf("-")+1);
            if(genderNum==1 || genderNum==3) {
                return "내국인 남자";
            }
            else if(genderNum==2 || genderNum==4) {
                return "내국인 여자";
            }
            else if(genderNum==5) {
                return "외국인 남자";
            }
            else if(genderNum==6) {
                return "외국인 여자";
            }
            else {
                return "주민등록번호를 잘 입력해주세요.";
            }
        }
        console.log(checkGender("091215-4057213")); // 내국인 여성

    // 5. split 실무 활용 예제
        // URL을 통해 특정 파라미터를 추출하기 (카테고리, 물품명)
        const url = "https://myshop.com/products/electronics/iphone15";
        const pageSegment = url.split("/");
        //console.log(pageSegment);
        let size = pageSegment.length;
        // 카테고리
        console.log(pageSegment[size-2]); // 여기서 전체길이의 -2
        // 물품명
        console.log(pageSegment[size-1]); // 여기서 전체길이의 -1
        console.log(`카테고리 : ${pageSegment[size - 2]}`);
        console.log(`물품명 : ${pageSegment[size - 1]}`);

        // *****로그파일을 통해 시간과 사용자 알아내기
        const csvData = 
            "2024-04-29, Login_Success, user_01\n2024-04-29, Login_Fail, user_02";
        const log = csvData.split("\n");
        for(line of log) {
            [date, status, user] = line.split(", "); // 배열 분할 할당
            // 로그인에 성공한 사람의 id와 성공시간을 출력
            if(status === "Login_Success") {
                console.log(`${user}님 ${date}에 로그인 성공입니다.`);
            }
            else {
                console.log(`${user}님 ${date}에 로그인 실패입니다.`);
            }
        }

    // 6. endsWith 실무 활용 예제
        // jpg, png 만 업로드 가능하다고 가정하자.
        const checkFileName = (fileName) => {
            // 모두 대문자로 변경 - 어느 쪽이든 한쪽으로 맞추자
            fileName = fileName.toUpperCase();
            if(fileName.endsWith(".JPG") || fileName.endsWith(".PNG")) {
                return "업로드가 가능합니다.";
            }
            else {
                return "업로드가 불가능합니다.";
            }
        }

        console.log(checkFileName("my_photo.JPG")); // 업로드가 가능합니다.
        console.log(checkFileName("my_photo.gif")); // 업로드가 불가능합니다.

    </script>
</body>
</html>
