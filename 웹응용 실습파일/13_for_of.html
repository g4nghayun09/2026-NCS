<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>for_of</title>
</head>
<body>
    <script>
        // for ~ of : 배열, 문자열에서 많이 사용
        let brands = ["애플", "구글", "마이크로소프트", "삼성", "아마존", "테슬라", "윈터"];

        // 1. 배열
        for(const brand of brands) {
            console.log(brand);
        }

        // 2. 문자열
        // 여기서 in 쓰면 숫자나옴. of 쓰면 값이 나옴
        let lang = "JavasCript";
        for(const char of lang) {
            console.log(char);
        }

        // 3. 숫자
        let nums = 9988475037;
        console.log(typeof(nums));
        for(const num of nums.toString()) {
            console.log(num);
        }

        
    </script>
</body>
</html>
